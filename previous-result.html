<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Previous Results - Big Boss</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-image: url('assets/previous-bg.jpeg');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    header {
      width: 100%;
      padding: 1.5rem 1rem;
      text-align: center;
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
      z-index: 100;
    }

    .input-section {
      text-align: center;
      margin: 30px 0 20px;
    }

    .input-section input,
    .input-section button {
      padding: 10px 16px;
      font-size: 16px;
      margin: 0 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .table-responsive {
      width: 100%;
      display: flex;
      justify-content: center;
      overflow-x: auto;
    }

    table {
      width: 100%;
      max-width: 1000px;
      margin: 20px auto;
      border-collapse: collapse;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      background: #fff;
    }

    th,
    td {
      padding: 8px;
      font-size: 13px;
      text-align: center;
      white-space: normal;
      word-break: break-word;
    }

    th {
      background: #0153eb;
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    tr:nth-child(even) td {
      background-color: #fafafa;
    }

    tr:hover td {
      background-color: #f0e7fa;
      transition: background 0.2s ease;
    }

    #status {
      text-align: center;
      margin-top: 20px;
      font-size: 15px;
      color: #999;
    }

    label {
      font-size: 20px;
      font-weight: bold;
      color: gold;
      margin-right: 0.5rem;
    }

    @media (max-width: 768px) {
      .input-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .input-section input,
      .input-section button {
        width: 90%;
        font-size: 15px;
      }

      table {
        font-size: 11px;
      }

      th,
      td {
        padding: 6px;
        font-size: 11px;
        border: 1px solid gray;
      }

      th {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>

  <header class="slide-down">
    <h1>BIG BOSS</h1>
    <nav class="fade-in">
      <a href="index.html">Home</a>
      <a href="today-result.html">Today Result</a>
      <a href="previous-result.html" class="active">Previous Result</a>
      <a href="result-file-download.html">Result File Download</a>
    </nav>
  </header>

  <section class="result-section fade-in">
    <h2 style="text-align:center;">📅 Previous Results</h2>

    <div class="input-section">
      <label for="from-date">From:</label>
      <input type="date" id="from-date">

      <label for="to-date">To:</label>
      <input type="date" id="to-date">

      <button onclick="fetchResults()">View Results</button>
    </div>

    <div id="table-container"></div>
    <p id="status"></p>
  </section>

  <footer class="fade-in">
    <p>© 2023 Big Boss | All Rights Reserved</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBEuhWn0E9t0CXLqtl9JS0meW-UaIOJ69U",
      authDomain: "bigboss-99c00.firebaseapp.com",
      databaseURL: "https://bigboss-99c00-default-rtdb.firebaseio.com",
      projectId: "bigboss-99c00",
      storageBucket: "bigboss-99c00.firebasestorage.app",
      messagingSenderId: "719397772316",
      appId: "1:719397772316:web:e2f705022908af1866d3d9",
      measurementId: "G-X7SGNWM2VS"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const showTimes = [
      { key: "10:00", label: "10:00 AM" },
      { key: "11:00", label: "11:00 AM" },
      { key: "12:00", label: "12:00 PM" },
      { key: "13:00", label: "01:00 PM" },
      { key: "17:00", label: "05:00 PM" },
      { key: "18:00", label: "06:00 PM" },
      { key: "19:00", label: "07:00 PM" },
      { key: "20:00", label: "08:00 PM" }
    ];

    function getDateRange(startDate, endDate) {
      const dates = [];
      let current = new Date(startDate);
      let last = new Date(endDate);

      while (current <= last) {
        const y = current.getFullYear();
        const m = String(current.getMonth() + 1).padStart(2, '0');
        const d = String(current.getDate()).padStart(2, '0');

        dates.push(`${y}-${m}-${d}`);
        current.setDate(current.getDate() + 1);
      }

      return dates;
    }

    function getCurrentTimeKey() {
      const now = new Date();
      const hour = now.getHours();
      const minute = now.getMinutes();
      const currentMinutes = hour * 60 + minute;

      let lastAvailable = null;

      for (const show of showTimes) {
        const parts = show.key.split(":");
        const showMinutes = parseInt(parts[0]) * 60 + parseInt(parts[1]);

        if (currentMinutes >= showMinutes) {
          lastAvailable = show.key;
        }
      }

      return lastAvailable;
    }

    async function fetchResults() {
      const from = document.getElementById("from-date").value;
      const to = document.getElementById("to-date").value;
      const tableContainer = document.getElementById("table-container");
      const status = document.getElementById("status");

      tableContainer.innerHTML = "";
      status.innerText = "";

      if (!from || !to) {
        status.innerText = "Please select both dates.";
        return;
      }

      if (from > to) {
        status.innerText = "From date must be less than To date.";
        return;
      }

      const range = getDateRange(from, to);
      const today = new Date().toISOString().split("T")[0];
      const currentTimeKey = getCurrentTimeKey();

      const dateMap = {};

      for (const date of range) {
        const snapshot = await db.ref("results/" + date).once("value");
        const data = snapshot.val();

        if (data) {
          dateMap[date] = {};

          Object.values(data).forEach(entry => {
            dateMap[date][entry.time] = entry.number;
          });
        }
      }

      if (Object.keys(dateMap).length === 0) {
        status.innerText = "No results found in selected range.";
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>S.No</th>
              <th>Date</th>
              ${showTimes.map(show => `<th>${show.label}</th>`).join("")}
            </tr>
          </thead>
          <tbody>
      `;

      let i = 1;

      for (const date of range) {
        const [yyyy, mm, dd] = date.split("-");
        const formattedDate = `${dd}-${mm}-${yyyy}`;

        html += `<tr>`;
        html += `<td>${i++}</td>`;
        html += `<td>${formattedDate}</td>`;

        for (const show of showTimes) {
          let result = "-";

          if (dateMap[date] && dateMap[date][show.key]) {
            result = dateMap[date][show.key];
          }

          /* FIX:
             If selected date is today,
             only show results up to current available time.
             Example:
             After 1PM => show till 01:00 PM
             After 8PM => show full today result
          */
          if (date === today) {
            if (!currentTimeKey) {
              result = "-";
            } else {
              const showIndex = showTimes.findIndex(s => s.key === show.key);
              const currentIndex = showTimes.findIndex(s => s.key === currentTimeKey);

              if (showIndex > currentIndex) {
                result = "-";
              }
            }
          }

          html += `<td>${result}</td>`;
        }

        html += `</tr>`;
      }

      html += `
          </tbody>
        </table>
      `;

      tableContainer.innerHTML = `<div class="table-responsive">${html}</div>`;
    }

    window.onload = () => {
      const today = new Date().toISOString().split("T")[0];

      document.getElementById("from-date").max = today;
      document.getElementById("to-date").max = today;
    };
  </script>

</body>

</html>
