<script>
document.getElementById('downloadBtn').addEventListener('click', async function () {

  const ok = confirm('Do you want to save the image?');
  if (!ok) return;

  const container = document.getElementById('capture-container');
  const ignored = container.querySelectorAll('.ignore-on-screenshot');

  ignored.forEach(el => el.style.visibility = 'hidden');

  /* Better sharp render */
  const canvas = await html2canvas(container, {
    allowTaint: true,
    useCORS: true,
    scale: 6,
    backgroundColor: null,
    width: container.offsetWidth,
    height: container.offsetHeight,
    scrollX: 0,
    scrollY: 0,
    letterRendering: true
  });

  /* Exact final size */
  const finalWidth = 768;
  const finalHeight = 740;

  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = finalWidth;
  finalCanvas.height = finalHeight;

  const ctx = finalCanvas.getContext('2d');

  /* Better font/text smoothing */
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";

  /* Full fit */
  ctx.drawImage(
    canvas,
    0,
    0,
    canvas.width,
    canvas.height,
    0,
    0,
    finalWidth,
    finalHeight
  );

  const link = document.createElement('a');
  link.download = 'BigBoss_Result.png';
  link.href = finalCanvas.toDataURL('image/png', 1.0);
  link.click();

  ignored.forEach(el => el.style.visibility = 'visible');

});
</script>

  <script>
   const firebaseConfig = {
      apiKey: "AIzaSyBEuhWn0E9t0CXLqtl9JS0meW-UaIOJ69U",
      authDomain: "bigboss-99c00.firebaseapp.com",
      databaseURL: "https://bigboss-99c00-default-rtdb.firebaseio.com",
      projectId: "bigboss-99c00",
      storageBucket: "bigboss-99c00.firebasestorage.app",
      messagingSenderId: "719397772316",
      appId: "1:719397772316:web:e2f705022908af1866d3d9",
      measurementId: "G-X7SGNWM2VS"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let randomInterval1, randomInterval2, randomInterval3;
    let isRunning = false;

    const digit = document.getElementById('digit1');
    const digit1 = document.getElementById('digit2');
    const digit2 = document.getElementById('digit3');

    function startRandomRun() {
      if (isRunning) return;
      isRunning = true;

      randomInterval1 = setInterval(() => digit.textContent = Math.floor(Math.random() * 10), 100);
      randomInterval2 = setInterval(() => digit1.textContent = Math.floor(Math.random() * 10), 102);
      randomInterval3 = setInterval(() => digit2.textContent = Math.floor(Math.random() * 10), 105);
    }

    function stopRandomRun(number) {
      clearInterval(randomInterval1);
      clearInterval(randomInterval2);
      clearInterval(randomInterval3);
      isRunning = false;

      digit.textContent = number[0];
      digit1.textContent = number[1];
      digit2.textContent = number[2];
    }

    function formatTime12hr(timeStr) {
      const [hour, minute] = timeStr.split(':');
      const h = parseInt(hour);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const hr12 = h % 12 || 12;
      return `${hr12}:${minute} ${ampm}`;
    }

    function formatCountdown(ms) {
      if (ms < 0) return "Result time passed";

      const totalSecs = Math.floor(ms / 1000);
      const hrs = Math.floor(totalSecs / 3600);
      const mins = Math.floor((totalSecs % 3600) / 60);
      const secs = totalSecs % 60;

      return `${hrs > 0 ? hrs + 'h ' : ''}${mins}m ${secs}s`;
    }

    function displayCurrentDate() {
      const dateEl = document.getElementById('current-date');
      const now = new Date();

      const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      };

      dateEl.innerText = now.toLocaleDateString('en-IN', options);
    }

    function fetchLatestDraw() {
      const today = new Date().toISOString().split('T')[0];
      const now = new Date();
      const currentTime = now.toTimeString().slice(0, 5);

      db.ref('results/' + today).once('value').then(snapshot => {

        const results = snapshot.val();

        const status = document.getElementById('result-status');
        const drawTimeEl = document.getElementById('drawTime');
        const remainingEl = document.getElementById('remainingTime');

        if (!results) {
          drawTimeEl.innerText = '--:--';
          remainingEl.innerText = '--';
          status.innerText = "✅ All results released for today";
          startRandomRun();
          return;
        }

        const entries = Object.values(results).sort((a, b) => a.time.localeCompare(b.time));

        let currentDraw = null;
        let nextDraw = null;

        for (const entry of entries) {
          if (entry.time <= currentTime) currentDraw = entry;
          else if (!nextDraw) nextDraw = entry;
        }

        const nextDrawTime = nextDraw ? new Date(`${today}T${nextDraw.time}:00`) : null;
        const fiveMinBeforeNext = nextDrawTime ? new Date(nextDrawTime.getTime() - 5 * 60 * 1000) : null;

        if (nextDraw) {
          const diff = nextDrawTime - now;
          remainingEl.innerText = formatCountdown(diff);

          if (now >= fiveMinBeforeNext) {
            drawTimeEl.innerText = formatTime12hr(nextDraw.time);
          } else if (currentDraw) {
            drawTimeEl.innerText = formatTime12hr(currentDraw.time);
          } else {
            drawTimeEl.innerText = '--:--';
          }

        } else if (currentDraw) {
          drawTimeEl.innerText = formatTime12hr(currentDraw.time);
          remainingEl.innerText = "No more draws today";
        }

        if (currentDraw && (!nextDrawTime || now < fiveMinBeforeNext)) {
          stopRandomRun(currentDraw.number);
        } else {
          startRandomRun();
        }

        status.innerText = nextDraw
          ? `🕒 Next result at ${formatTime12hr(nextDraw.time)}`
          : `✅ All results released for today`;

      }).catch(err => {
        console.error(err);
        document.getElementById('result-status').innerText = '❌ Error fetching result.';
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      displayCurrentDate();
      fetchLatestDraw();
      setInterval(fetchLatestDraw, 1000);
    });
  </script>
